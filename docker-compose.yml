services:
  api:
    build: ./app
    container_name: sitewatch-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: sitewatch
      DATABASE_USER: sitewatch
      DATABASE_PASSWORD: sitewatch123
    restart: always
    depends_on:
      - postgres

  monitor:
    build: ./app
    container_name: sitewatch-monitor
    command: python monitor.py
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: sitewatch
      DATABASE_USER: sitewatch
      DATABASE_PASSWORD: sitewatch123
      CHECK_INTERVAL_SECONDS: 60
      API_BASE_URL: http://api:8000
    restart: always
    depends_on:
      - postgres
      - api

  postgres:
    image: postgres:17
    container_name: sitewatch-postgres
    environment:
      POSTGRES_DB: sitewatch
      POSTGRES_USER: sitewatch
      POSTGRES_PASSWORD: sitewatch123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  prometheus:
    image: prom/prometheus
    container_name: sitewatch-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: always
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    container_name: sitewatch-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    restart: always
    depends_on:
      - prometheus

volumes:
  postgres-data:
  grafana-data: